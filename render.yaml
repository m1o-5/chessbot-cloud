services:
  - type: web
    name: chess-analyzer
    runtime: python
    plan: free
    buildCommand: ""
    startCommand: python app.py
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
